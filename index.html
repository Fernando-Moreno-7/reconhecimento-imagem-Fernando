<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teachable Machine - Reconhecimento de Imagem</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
    }

    .card-main {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
    }

    #webcam-container canvas {
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 30px rgba(130, 80, 255, 0.3);
      width: 100% !important;
      max-width: 300px;
      height: auto !important;
    }

    #webcam-container {
      display: flex;
      justify-content: center;
    }

    .btn-camera {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 50px;
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.04em;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.5);
    }

    .btn-camera:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 6px 28px rgba(124, 58, 237, 0.7);
      background: linear-gradient(135deg, #9333ea, #6366f1);
    }

    .btn-camera:active {
      transform: scale(0.97);
    }

    .btn-camera .icon {
      font-size: 1.1rem;
      margin-right: 8px;
    }

    .label-item {
      margin-bottom: 14px;
    }

    .label-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .progress {
      height: 10px;
      border-radius: 50px;
      background: rgba(255,255,255,0.08);
    }

    .progress-bar {
      border-radius: 50px;
      background: linear-gradient(90deg, #7c3aed, #38bdf8);
      transition: width 0.3s ease;
    }

    .status-badge {
      display: inline-block;
      background: rgba(124, 58, 237, 0.25);
      border: 1px solid rgba(124, 58, 237, 0.5);
      color: #c4b5fd;
      font-size: 0.78rem;
      padding: 3px 12px;
      border-radius: 50px;
      margin-top: 4px;
    }

    #no-predictions {
      color: rgba(255,255,255,0.35);
      font-size: 0.88rem;
      text-align: center;
      padding: 12px 0;
    }

    footer {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-top: 2rem;
      padding-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card-main p-4 p-md-5">

          <div class="text-center mb-4">
            <div class="mb-2" style="font-size:2.2rem;">🤖</div>
            <h1>Teachable Machine</h1>
            <p class="subtitle">Reconhecimento de Imagem com IA</p>
          </div>

          <div class="text-center mb-4">
            <button class="btn-camera" onclick="init()" id="startBtn">
              <span class="icon">📷</span> Ativar Câmera
            </button>
            <div id="status-msg" class="mt-2"></div>
          </div>

          <div id="webcam-container" class="mb-4"></div>

          <div id="label-container">
            <div id="no-predictions">Inicie a câmera para ver as predições.</div>
          </div>

        </div>

        <footer>Powered by TensorFlow.js + Teachable Machine</footer>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL = "./my_model/";
    let model, webcam, labelContainer, maxPredictions;
    let bars = [];

    async function init() {
      const btn = document.getElementById("startBtn");
      const statusMsg = document.getElementById("status-msg");

      btn.disabled = true;
      btn.innerHTML = '⏳ Carregando modelo...';
      statusMsg.innerHTML = '<span class="status-badge">Aguardando permissão da câmera...</span>';

      try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);

        statusMsg.innerHTML = '<span class="status-badge" style="background:rgba(56,189,248,0.2);border-color:rgba(56,189,248,0.5);color:#7dd3fc;">✅ Câmera ativa</span>';
        btn.innerHTML = '📷 Câmera Ativada';

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        bars = [];

        for (let i = 0; i < maxPredictions; i++) {
          const wrapper = document.createElement("div");
          wrapper.className = "label-item";

          const nameRow = document.createElement("div");
          nameRow.className = "label-name";

          const nameSpan = document.createElement("span");
          nameSpan.id = "label-name-" + i;
          nameSpan.textContent = "Classe " + (i + 1);

          const pctSpan = document.createElement("span");
          pctSpan.id = "label-pct-" + i;
          pctSpan.textContent = "0%";
          pctSpan.style.color = "#38bdf8";

          nameRow.appendChild(nameSpan);
          nameRow.appendChild(pctSpan);

          const progressWrap = document.createElement("div");
          progressWrap.className = "progress";

          const bar = document.createElement("div");
          bar.className = "progress-bar";
          bar.id = "bar-" + i;
          bar.style.width = "0%";
          bar.setAttribute("role", "progressbar");
          bar.setAttribute("aria-valuenow", "0");
          bar.setAttribute("aria-valuemin", "0");
          bar.setAttribute("aria-valuemax", "100");

          progressWrap.appendChild(bar);
          wrapper.appendChild(nameRow);
          wrapper.appendChild(progressWrap);
          labelContainer.appendChild(wrapper);
          bars.push({ bar, nameSpan, pctSpan });
        }

      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = '📷 Tentar Novamente';
        statusMsg.innerHTML = '<span class="status-badge" style="background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5);color:#fca5a5;">❌ Erro ao acessar câmera</span>';
        console.error(err);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      for (let i = 0; i < maxPredictions; i++) {
        const prob = prediction[i].probability;
        const pct = Math.round(prob * 100);
        bars[i].nameSpan.textContent = prediction[i].className;
        bars[i].pctSpan.textContent = pct + "%";
        bars[i].bar.style.width = pct + "%";
        bars[i].bar.setAttribute("aria-valuenow", pct);
      }
    }
  </script>
</body>
</html>
