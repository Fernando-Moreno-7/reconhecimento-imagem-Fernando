<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Classificador</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: 'Segoe UI', sans-serif;
    }

    .card-ai {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        text-align: center;
    }

    h2 {
        font-weight: bold;
        margin-bottom: 15px;
    }

    .btn-start {
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        border: none;
        padding: 12px 25px;
        border-radius: 30px;
        font-size: 16px;
        color: white;
        transition: 0.3s;
    }

    .btn-start:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    #webcam-container canvas {
        width: 100% !important;
        border-radius: 15px;
        margin-top: 15px;
        border: 3px solid rgba(255,255,255,0.2);
    }

    .prediction {
        margin-top: 10px;
        text-align: left;
    }

    .label {
        font-size: 14px;
        margin-bottom: 3px;
    }

    .progress {
        height: 10px;
        border-radius: 10px;
        background: rgba(255,255,255,0.2);
    }

    .progress-bar {
        background: linear-gradient(90deg, #00ffcc, #00c6ff);
    }
</style>
</head>

<body>

<div class="card-ai">
    <h2>🤖 Classificador IA</h2>
    <button class="btn-start" onclick="init()">Iniciar</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/bFDfS6G7v/";

let model, webcam, labelContainer, maxPredictions;

async function init() {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true;
    webcam = new tmImage.Webcam(320, 320, flip);

    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";

    for (let i = 0; i < maxPredictions; i++) {
        const div = document.createElement("div");
        div.classList.add("prediction");
        div.innerHTML = `
            <div class="label">Classe</div>
            <div class="progress">
                <div class="progress-bar" style="width: 0%"></div>
            </div>
        `;
        labelContainer.appendChild(div);
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < maxPredictions; i++) {
        const prob = (prediction[i].probability * 100).toFixed(1);

        const label = prediction[i].className;
        const container = labelContainer.childNodes[i];

        container.querySelector(".label").innerHTML = `${label} (${prob}%)`;
        container.querySelector(".progress-bar").style.width = prob + "%";
    }
}
</script>

</body>
</html>
